name: Build Android APK

# Builds the Flutter Android app (server_manager_ui) into an installable APK.
# GitHub's runners can reach dl.google.com / the Android SDK, so the build that
# can't run in the dev container happens here instead.
on:
  workflow_dispatch:        # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/android-apk.yml'

permissions:
  contents: write   # needed to publish the APKs as a GitHub Release asset

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build release APKs (per-ABI + universal)
        run: |
          flutter build apk --release --split-per-abi
          flutter build apk --release

      - name: List artifacts
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload APKs (CI artifact, 30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: server-manager-apk
          path: app/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30

      # Also publish to a rolling "android-latest" Release so the APK has a
      # permanent, CDN-served download link (artifact links expire and live on
      # blob storage some networks block). The universal app-release.apk is the
      # one to install on any phone.
      - name: Publish APKs to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Server Manager — latest Android build
          body: |
            Automated build from `${{ github.sha }}` (run #${{ github.run_number }}).

            Install **app-release.apk** (universal). The `*-abi.apk` files are
            smaller per-architecture variants if you know your device's ABI.
          files: app/build/app/outputs/flutter-apk/*.apk
          fail_on_unmatched_files: true
