name: server_manager_ui
description: A polished Flutter desktop client for the server-manager bash CLI, driven over SSH.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  # withValues(), DropdownButtonFormField.value, TabBarThemeData and
  # CardThemeData all require Flutter 3.27+.
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Transport / SSH
  dartssh2: ^2.10.0

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Interactive terminal (xterm widget + emulator). Works on web and desktop;
  # the live SSH shell behind it is desktop-only (demo shell covers web).
  xterm: ^4.0.0

  # Animation & motion
  flutter_animate: ^4.5.0
  animations: ^2.0.11

  # Code editor for the merge conflict-resolution panels (line numbers, syntax
  # highlighting, copy/paste). Pulls in highlight / flutter_highlight. Web-safe.
  flutter_code_editor: ^0.3.5

  # Storage (secrets)
  flutter_secure_storage: ^9.2.2

  # Desktop window control
  window_manager: ^0.4.2

  # Native file picking
  file_selector: ^1.0.3

  # Typography
  google_fonts: ^6.2.1

  # JSON
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: AppSans
      fonts:
        - asset: assets/fonts/AppSans-Regular.ttf
        - asset: assets/fonts/AppSans-Bold.ttf
          weight: 700
    - family: AppMono
      fonts:
        - asset: assets/fonts/AppMono-Regular.ttf
        - asset: assets/fonts/AppMono-Bold.ttf
          weight: 700
